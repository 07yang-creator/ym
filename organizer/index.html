<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>主办台 · ym</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../sanitize.js"></script>
<style>
  /* ym identity — the reception table (see ym/design/ym-event-day.jsx) */
  :root{
    --felt:#16241E;--felt-up:#1E3129;--stock:#E8E0CD;--stock-dim:#8E9A90;
    --brass:#C9A356;--brass-dim:#6E5F36;--ink:#0E1512;--muted:#7C8F85;
    --line:#2C4238;--alarm:#D2604A;--ok:#7FA98A;
    --w:1060px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:#0E1713;color:var(--stock);
    font:14px/1.6 "Noto Sans JP",-apple-system,"PingFang SC","Hiragino Sans",sans-serif}
  .num{font-family:Oswald,sans-serif;font-variant-numeric:tabular-nums}
  .app{max-width:var(--w);margin:0 auto;min-height:100vh;background:var(--felt);position:relative}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  input,select,textarea{font:inherit;color:var(--stock);background:var(--felt-up);
    border:1px solid var(--line);border-radius:4px;padding:8px 10px;width:100%}
  input::placeholder,textarea::placeholder{color:var(--brass-dim)}
  input:focus,select:focus{outline:1px solid var(--brass);border-color:var(--brass)}
  .muted{color:var(--muted)}
  .lbl{font-size:10px;letter-spacing:.2em;color:var(--muted)}
  /* top bar */
  .topbar{position:sticky;top:0;z-index:20;height:50px;display:flex;align-items:center;gap:12px;
    padding:0 14px;background:var(--felt);border-bottom:1px solid var(--line)}
  .topbar .logo{font-family:Oswald,sans-serif;font-size:17px;color:var(--brass);letter-spacing:.06em}
  .topbar .ttl{font-size:12px;color:var(--muted);letter-spacing:.18em}
  .topbar .sp{flex:1}
  .navlinks{display:flex;gap:2px}
  .navlinks button{color:var(--muted);font-size:12.5px;letter-spacing:.08em;padding:7px 9px;border-radius:4px}
  .navlinks button.on{color:var(--brass);border-bottom:2px solid var(--brass);border-radius:0}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--brass);color:var(--ink);
    font-weight:700;display:grid;place-items:center;font-size:12px;flex:none}
  /* layout: library panel + sheet */
  .wrap{display:flex;align-items:flex-start}
  .main{flex:1;min-width:0;padding:14px 14px 90px}
  .panel{width:252px;flex:none;position:sticky;top:50px;max-height:calc(100vh - 50px);
    overflow:auto;padding:14px 12px 30px;border-right:1px solid var(--line);display:none}
  @media(min-width:900px){.panel{display:block}.fab{display:none}}
  /* phone drawer */
  .drawerbg{position:fixed;inset:0;background:rgba(8,12,10,.6);z-index:40}
  .drawer{position:fixed;top:0;bottom:0;left:0;width:min(78vw,300px);z-index:41;background:var(--felt);
    border-right:1px solid var(--line);overflow:auto;padding:14px 12px 30px;
    animation:slidein .18s ease}
  @keyframes slidein{from{transform:translateX(-40px);opacity:0}to{transform:none;opacity:1}}
  .fab{position:fixed;bottom:20px;left:16px;z-index:30;background:var(--brass);color:var(--ink);
    border-radius:6px;padding:11px 16px;font-size:13px;font-weight:700;letter-spacing:.08em;
    box-shadow:0 8px 20px -6px rgba(0,0,0,.7)}
  /* round corner fabs (📷/🎤) — jjcashflow accountant pattern, ym palette.
     position:fixed directly (iOS absolute-in-fixed bug); right hugs app edge on desktop */
  .rfab{position:fixed;z-index:38;width:52px;height:52px;border-radius:50%;
    right:max(16px,calc(50vw - var(--w)/2 + 16px));
    background:var(--felt-up);border:1.5px solid var(--brass-dim);color:var(--brass);
    display:grid;place-items:center;font-size:22px;cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.45);transition:transform .12s;
    -webkit-user-select:none;user-select:none}
  .rfab:active{transform:scale(.92)}
  .rfab.rec{background:var(--alarm);border-color:var(--alarm);color:#fff;animation:rfabpulse 1.1s infinite}
  @keyframes rfabpulse{0%,100%{box-shadow:0 0 0 0 rgba(210,96,74,.5),0 4px 14px rgba(0,0,0,.45)}
    50%{box-shadow:0 0 0 10px rgba(210,96,74,0),0 4px 14px rgba(0,0,0,.45)}}
  .fabmenu{position:fixed;z-index:39;right:max(16px,calc(50vw - var(--w)/2 + 16px));
    display:flex;flex-direction:column;gap:7px;align-items:flex-end}
  .fabmenu label{background:var(--stock);color:var(--ink);border-radius:4px;padding:10px 14px;
    font-size:12.5px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px -6px rgba(0,0,0,.7)}
  .modal-g{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:50;
    width:min(94vw,520px);max-height:80vh;overflow:auto}
  /* ===== 发布 (Y6) ===== */
  .petool{display:flex;gap:4px;flex-wrap:wrap;margin:10px 0 7px}
  .petool button{border:1px solid var(--line);border-radius:3px;padding:6px 9px;font-size:12px;color:var(--stock-dim)}
  .petool button:hover{border-color:var(--brass);color:var(--brass)}
  .pe{background:var(--felt-up);border:1px solid var(--line);border-radius:4px;min-height:260px;
    padding:13px 15px;font-size:14px;line-height:1.9;overflow-wrap:break-word;overflow:auto;max-height:52vh}
  .pe:focus{outline:1px solid var(--brass);border-color:var(--brass)}
  .pe h2{font-size:16.5px;margin:14px 0 6px}.pe h3{font-size:14.5px;margin:12px 0 5px}
  .pe p{margin:8px 0}.pe ul,.pe ol{margin:8px 0;padding-left:22px}
  .pe img{max-width:100%;height:auto;border-radius:3px;display:block;margin:8px 0}
  .pe a{color:var(--brass);text-decoration:underline}
  .pe blockquote{border-left:2px solid var(--brass-dim);margin:8px 0;padding-left:11px;color:var(--stock-dim)}
  .pe table{border-collapse:collapse;width:100%;margin:8px 0}
  .pe td,.pe th{border:1px solid var(--line);padding:5px 8px;font-size:13px;text-align:left}
  .pe:empty:before{content:attr(data-ph);color:var(--brass-dim)}
  .postrow{display:flex;gap:10px;align-items:baseline;background:var(--felt-up);border:1px solid var(--line);
    border-radius:5px;padding:11px 13px;margin-bottom:7px;width:100%;text-align:left}
  .postrow .k{font-size:10px;letter-spacing:.14em;color:var(--muted);flex:none;width:34px}
  .postrow .tt{flex:1;min-width:0;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .postrow .st{font-size:10.5px;flex:none;letter-spacing:.1em}
  .postrow .st.on{color:var(--brass)}.postrow .st.off{color:var(--muted)}
  .postrow.ev{border-style:dashed}
  /* library */
  .libtabs{display:flex;gap:3px;margin-bottom:12px}
  .libtabs button{flex:1;font-size:11px;letter-spacing:.04em;padding:7px 0;color:var(--muted);
    border:1px solid var(--line);border-radius:4px;white-space:nowrap}
  .libtabs button.on{color:var(--ink);background:var(--stock);border-color:var(--stock);font-weight:700}
  .libitem{display:block;width:100%;text-align:left;background:var(--felt-up);border:1px solid var(--line);
    border-radius:4px;padding:9px 11px;margin-bottom:7px;transition:transform .12s ease}
  .libitem:hover{border-color:var(--brass)}
  .libitem:active{transform:translateY(-2px)}
  .libitem .t{font-size:13px}
  .libitem .m{font-size:10.5px;color:var(--muted);margin-top:2px}
  .libhint{font-size:10.5px;color:var(--muted);line-height:1.7;margin:10px 2px}
  /* sheet */
  .evhead{background:var(--felt-up);border:1px solid var(--line);border-radius:6px;padding:13px 14px;margin-bottom:12px}
  .evhead.sel{border-color:var(--brass)}
  .evhead .name{font-size:16px;font-weight:700}
  .evhead .meta{font-size:11.5px;color:var(--muted);margin-top:2px;letter-spacing:.06em}
  .rowcard{display:flex;gap:10px;background:var(--felt-up);border:1px solid var(--line);
    border-radius:6px;padding:10px 12px;margin-bottom:8px;position:relative}
  .rowcard.sel{border-color:var(--brass)}
  .rowcard .tm{width:64px;flex:none}
  .rowcard .tm input{padding:6px 4px;text-align:center;font-family:Oswald,sans-serif;font-size:14px}
  .rowcard .bd{flex:1;min-width:0}
  .rowcard .bd input{padding:6px 8px}
  .rowcard .seg2{display:flex;gap:6px}
  .rowcard .seg2 .segi{flex:2}.rowcard .seg2 .owni{flex:1}
  .rowops{display:flex;flex-direction:column;gap:2px;flex:none;justify-content:center}
  .rowops button{color:var(--brass-dim);font-size:12px;padding:2px 5px;border-radius:3px}
  .rowops button:hover{color:var(--brass)}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:3px;
    background:var(--felt);border:1px solid var(--line);color:var(--stock-dim);cursor:pointer;user-select:none}
  .chip .x{color:var(--brass-dim);padding:0 1px}
  .chip .x:hover{color:var(--alarm)}
  .chip.s0{border-style:dashed}
  .chip.s1{border-color:var(--brass-dim);color:var(--stock)}
  .chip.s2{border-color:var(--brass);color:var(--brass)}
  .chip.s3{background:var(--stock);border-color:var(--stock);color:var(--ink);font-weight:700;
    box-shadow:0 3px 8px -2px rgba(0,0,0,.5)}
  .chip.money{border-radius:12px}
  .chip.money.in{color:var(--ok)}
  .chip.money.out{color:var(--stock-dim)}
  .chip.money .amt{font-family:Oswald,sans-serif;font-size:11.5px}
  .addrow{width:100%;border:1px dashed var(--line);border-radius:6px;padding:11px;color:var(--muted);
    font-size:12.5px;letter-spacing:.1em;margin:2px 0 16px}
  .addrow:hover{border-color:var(--brass);color:var(--brass)}
  /* strips */
  .strips{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .strip{flex:1;min-width:230px;background:var(--felt-up);border:1px solid var(--line);border-radius:6px;padding:10px 12px}
  .strip .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .strip .hd .lbl{font-size:10px}
  .stcounts{display:flex;gap:10px}
  .stcounts .c{text-align:center}
  .stcounts .c .n{font-family:Oswald,sans-serif;font-size:19px;line-height:1.1}
  .stcounts .c .l{font-size:9.5px;color:var(--muted);letter-spacing:.06em}
  .stcounts .c.warn .n{color:var(--alarm)}
  .stcounts .c.ok .n{color:var(--brass)}
  .mline{display:flex;justify-content:space-between;font-size:12px;margin:3px 0}
  .mline .num{font-size:13px}
  .mline.total{border-top:1px solid var(--line);padding-top:5px;margin-top:5px;font-weight:700}
  .mline .neg{color:var(--alarm)}.mline .pos{color:var(--ok)}
  /* event switcher */
  .evsw{display:flex;gap:7px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .evsw select{flex:1;min-width:150px}
  .btn{background:var(--brass);color:var(--ink);border-radius:4px;padding:9px 14px;font-size:12.5px;
    font-weight:700;letter-spacing:.06em;flex:none}
  .btn.ghost{background:none;color:var(--brass);border:1px solid var(--brass-dim)}
  .btn.sm{padding:6px 10px;font-size:11.5px}
  .btn.danger{background:none;color:var(--alarm);border:1px solid var(--alarm);opacity:.85}
  /* today */
  .todaycard{background:var(--felt-up);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:10px}
  .todaycard .d{font-size:11px;color:var(--muted);letter-spacing:.14em}
  .todaycard .t{font-size:15px;font-weight:700;margin-top:2px}
  .todaycard .fu{font-size:12px;color:var(--stock-dim);margin-top:6px;line-height:1.8}
  .todaycard .fu b{color:var(--alarm);font-weight:700}
  .sec{font-size:11px;letter-spacing:.2em;color:var(--muted);margin:18px 2px 9px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
  .cal .dow{text-align:center;font-size:10px;color:var(--muted);padding:2px 0}
  .cal .day{border:1px solid var(--line);border-radius:4px;min-height:44px;padding:3px 4px;font-size:10.5px;color:var(--muted)}
  .cal .day.out{opacity:.3}
  .cal .day.today{border-color:var(--brass)}
  .cal .day .dot{margin-top:3px;font-size:9px;color:var(--brass);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:12.5px;line-height:2}
  /* library manage view */
  .libgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
  .addform{background:var(--felt-up);border:1px dashed var(--line);border-radius:6px;padding:11px;margin-top:10px}
  .addform .frow{display:flex;gap:6px;margin-bottom:6px}
  /* ===== day mode 当天 (design: ym/design/ym-event-day.jsx) ===== */
  .dayhead{display:flex;align-items:flex-end;justify-content:space-between;padding:2px 2px 12px;
    border-bottom:1px solid var(--line);margin-bottom:14px}
  .dayhead .d{font-size:10px;color:var(--muted);letter-spacing:.18em}
  .dayhead .d .bk{color:var(--brass);cursor:pointer}
  .dayhead .t{font-size:15px;font-weight:500;margin-top:4px}
  .ratio{text-align:right}
  .ratio .n{font-family:Oswald,sans-serif;font-size:22px;line-height:1;font-variant-numeric:tabular-nums}
  .ratio .l{font-size:9px;letter-spacing:.12em;color:var(--muted);margin-top:3px}
  .ratio.bad .n,.ratio.bad .l{color:var(--alarm)}
  .cols{display:flex;gap:12px}
  .col{flex:1;min-width:0}
  .colsep{width:1px;background:var(--line);flex:none}
  .colhd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding:0 2px}
  .colhd .g{font-size:11px;letter-spacing:.18em;color:var(--muted)}
  .colhd .c{font-family:Oswald,sans-serif;font-size:13px;color:var(--stock-dim)}
  .colhd .c.full{color:var(--brass)}
  .bgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .badge{position:relative;aspect-ratio:1/1.15;display:flex;flex-direction:column;align-items:center;
    justify-content:center;border-radius:3px;border:1px dashed var(--line);color:var(--stock-dim);
    transition:transform .14s ease,background .14s ease,box-shadow .14s ease}
  .badge .bn{font-family:Oswald,sans-serif;font-size:24px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
  .badge .bl{font-size:9px;margin-top:3px;opacity:.5;letter-spacing:.02em}
  .badge.on{background:var(--stock);border:1px solid var(--stock);color:var(--ink);
    transform:translateY(-3px) rotate(-1.2deg);box-shadow:0 6px 12px -4px rgba(0,0,0,.65)}
  .badge.on .bl{opacity:.75}
  .badge.on .dot{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:9px;background:var(--brass)}
  .ticketbar{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--felt-up);
    border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin:16px 0 8px;font-size:12px}
  .boardops{display:flex;gap:8px;margin-top:10px}
  .note9{font-size:10px;color:var(--muted);margin-top:16px;line-height:1.8}
  .daytabs{position:fixed;bottom:0;left:0;right:0;background:var(--felt);border-top:1px solid var(--line);
    display:flex;z-index:30}
  .daytabs button{flex:1;padding:15px 0 calc(15px + env(safe-area-inset-bottom));font-size:12px;
    letter-spacing:.2em;color:var(--muted);border-top:2px solid transparent;margin-top:-1px}
  .daytabs button.on{color:var(--brass);border-top-color:var(--brass)}
  .runrow{display:flex;gap:10px;align-items:center;padding:12px 10px;border:1px solid var(--line);
    border-radius:6px;margin-bottom:7px;background:none;width:100%;text-align:left}
  .runrow .rt{font-family:Oswald,sans-serif;font-size:15px;width:52px;flex:none;color:var(--stock-dim)}
  .runrow .rs{flex:1;min-width:0;font-size:13.5px}
  .runrow .rs .ow{font-size:10.5px;color:var(--muted)}
  .runrow .ra{font-family:Oswald,sans-serif;font-size:12px;color:var(--brass);flex:none}
  .runrow .tag9{font-size:9px;letter-spacing:.18em;color:var(--brass);flex:none}
  .runrow.done{opacity:.45}
  .runrow.now{border-color:var(--brass);background:var(--felt-up)}
  .runrow.next{border-style:dashed;border-color:var(--brass-dim)}
  .whochips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
  .whochip{border-radius:3px;padding:7px 11px;border:1px solid var(--line);color:var(--stock-dim);
    font-family:Oswald,sans-serif;font-size:13px;font-variant-numeric:tabular-nums}
  .whochip.on{background:var(--stock);border-color:var(--stock);color:var(--ink)}
  .recbtn{width:100%;height:112px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1px solid var(--line);border-radius:3px;transition:border-color .16s ease}
  .recbtn.rec{background:var(--felt-up);border-color:var(--brass)}
  .recbtn:disabled{opacity:.35}
  .recline{height:2px;background:var(--brass);width:12%;opacity:.35;transition:width .9s linear}
  .recbtn.rec .recline{opacity:1}
  .reclbl{font-size:11px;color:var(--muted);margin-top:14px;letter-spacing:.12em}
  .recbtn.rec .reclbl{color:var(--brass)}
  .stockcard{background:var(--stock);color:var(--ink);border-radius:3px;padding:16px;
    box-shadow:0 10px 24px -8px rgba(0,0,0,.7);margin-top:14px}
  .stockcard .schd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .stockcard .schd .who{font-family:Oswald,sans-serif;font-size:20px}
  .stockcard .schd .sub{font-size:11px;opacity:.5}
  .sfield{margin-bottom:11px}
  .sfield .fl{font-size:9px;opacity:.5;letter-spacing:.18em;margin-bottom:3px}
  .sfield input,.sfield textarea{background:none;border:0;border-bottom:1.5px solid rgba(14,21,18,.25);
    border-radius:0;color:var(--ink);padding:4px 2px;font-size:13px;width:100%}
  .sfield input:focus,.sfield textarea:focus{outline:none;border-bottom-color:var(--brass-dim)}
  .sfield.blank input{border-bottom:1.5px dotted rgba(14,21,18,.5)}
  .sfield .hint9{font-size:10px;color:var(--alarm);opacity:.85}
  .sgrid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
  .scbtns{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(14,21,18,.15)}
  .scbtns .ok{flex:1;background:var(--ink);color:var(--stock);border-radius:3px;padding:11px;
    font-size:12px;letter-spacing:.08em}
  .scbtns .alt{border:1px solid rgba(14,21,18,.25);border-radius:3px;padding:11px 16px;font-size:12px}
  .transcript9{font-size:10px;margin-top:10px;line-height:1.7;color:rgba(14,21,18,.55)}
  .draftline{font-size:13.5px;line-height:1.8}
  /* ===== 复盘 review + 保存回资产库 ===== */
  .rvsec{background:var(--felt-up);border:1px solid var(--line);border-radius:6px;padding:12px 14px;margin-bottom:12px}
  .rvsec .hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .rvrow{display:flex;gap:10px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .rvrow:last-child{border-bottom:0}
  .rvrow .c1{font-family:Oswald,sans-serif;width:50px;flex:none;color:var(--stock-dim)}
  .rvrow .c2{flex:1;min-width:0}
  .rvrow .c3{font-family:Oswald,sans-serif;color:var(--brass)}
  .rvrow .gap{font-size:11px;flex:none}
  .rvrow .gap.late{color:var(--alarm)}
  .rvrow .gap.early,.rvrow .gap.ontime{color:var(--ok)}
  .rvrow .gap.miss{color:var(--muted)}
  .exports{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
  .sbitem{display:flex;gap:9px;align-items:center;width:100%;text-align:left;padding:9px 11px;
    border:1px dashed var(--line);border-radius:4px;margin-bottom:6px;color:var(--stock-dim);font-size:12.5px}
  .sbitem.on{border:1px solid var(--brass);color:var(--stock)}

/* ================= helpers ================= */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function fmtDate(s){if(!s)return '未定';const d=new Date(s+'T00:00:00');if(isNaN(d))return s;
  return (d.getMonth()+1)+'/'+d.getDate()+'('+'日一二三四五六'[d.getDay()]+')';}

  document.body.appendChild(t);setTimeout(()=>t.remove(),1800);}

function nowHM(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function shrink(file,cb){ // photos → ≤1600px jpeg before upload
  const img=new Image();
  img.onload=()=>{const s=Math.min(1,1600/Math.max(img.width,img.height));
    const c=document.createElement('canvas');c.width=Math.round(img.width*s);c.height=Math.round(img.height*s);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    cb(c.toDataURL('image/jpeg',.85).split(',')[1]);URL.revokeObjectURL(img.src);};
  img.src=URL.createObjectURL(file);
}

// Test stage: local-first, per-browser (auth lands with 0008_ym.sql — see ym/PLAN.md §4)
const LS_KEY='jjym_v1';

function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(STORE));}catch(e){
  if(!S._quota){S._quota=1;toast('⚠ 本机存储已满');}}

function cloudPushAll(){
  if(!canCloud())return;

/* hub-and-spoke: publish each linked member's own view (0009 ym_share) */
function shareDataFor(p){
  const jobs=[];
  // never publish 教学示例 duties to a real volunteer's page — the tutorial invites practice
  STORE.events.filter(e=>!e.demo).forEach(e=>{
    const duties=[];
    const scan=(holder,where,time)=>holder.resources.forEach(c=>{
      if(c.refId===p.id)duties.push({where,time,status:RES_ST[c.status||0]});});
    scan(e.header,'活动全场','');
    e.rows.forEach(r=>scan(r,r.seg||'',r.time||''));
    if(!duties.length)return;
    const log=(e.volLog||{})[p.id]||{};
    jobs.push({event:e.name,date:e.date,start:e.start||'',venue:e.venue||'',
      duties,hours:log.hours||'',review:log.review||''});
  });
  return {name:p.name,role:p.role||'',jobs,at:new Date().toISOString()};
}
// must match 0013's ym_share_email_shape CHECK exactly, or a save silently 500s server-side
const EMAIL_RE=/^[^@\s]+@[^@\s]+\.[^@\s]+$/;
function pushShares(){
  if(!canCloud())return;
  const linked=STORE.library.resources.filter(p=>catOf(p)==='volunteer'&&p.shareEmail);
  if(!linked.length)return;
  // De-duplicate by address: ym_share's PK is (host, member_email), and two rows with the
  // same key in ONE upsert makes Postgres abort the whole statement ("cannot affect row a
  // second time") — which would silently freeze publishing for every other volunteer too.
  const byEmail={};
  linked.forEach(p=>{
    const em=String(p.shareEmail||'').trim().toLowerCase();
    if(!EMAIL_RE.test(em)||em.length>320)return;      // never send what the CHECK will reject
    byEmail[em]=p;                                     // last record wins
  });
  const rows=Object.keys(byEmail).map(em=>({host:SESSION.user.id,member_email:em,
    payload:shareDataFor(byEmail[em])}));
  const bad=linked.length-rows.length;
  if(!rows.length){if(bad)toast('成员邮箱格式有误，未发布');return;}
  sb.from('ym_share').upsert(rows,{onConflict:'host,member_email'})
    .then(r=>{if(r.error)toast('成员发布失败：'+r.error.message);
      else if(bad)toast('已发布 '+rows.length+' 位（'+bad+' 位邮箱重复或有误，已跳过）');});
}
// revoking or re-addressing must actually take the old row away
function dropShare(email){
  if(!canCloud()||!email)return;
  sb.from('ym_share').delete().match({host:SESSION.user.id,
    member_email:String(email).trim().toLowerCase()}).then(()=>{});
}
function grantAccount(pid){

  if(catOf(p)!=='volunteer'){toast('只有志愿者/工作人员可以授权账号（嘉宾资料仅主办方可见）');return;}
  if(!canCloud()){toast('先登录并通过批准，才能授权成员账号');return;}
  const cur=p.shareEmail||((p.contact||'').indexOf('@')>0?p.contact:'');
  const em=prompt('成员邮箱 — TA 用此邮箱注册后，只能看到你发布给TA的内容（本人岗位/信息）。留空=取消授权',cur);
  if(em===null)return;
  const v=em.trim().toLowerCase();
  const old=p.shareEmail;
  if(!v){ if(old)dropShare(old);
    delete p.shareEmail;save();render();toast('已取消授权');return;}
  if(!EMAIL_RE.test(v)||v.length>320){toast('邮箱格式不对（需要 name@example.com 这样的完整地址）');return;}
  const clash=STORE.library.resources.find(x=>x.id!==p.id&&String(x.shareEmail||'').toLowerCase()===v);
  if(clash){toast('这个邮箱已授权给「'+clash.name+'」，请先取消那边');return;}
  if(old&&old.toLowerCase()!==v)dropShare(old);      // don't leave the old address readable
  p.shareEmail=v;save();render();toast('已授权 '+v+' — 保存时自动发布TA的岗位');
}
async function cloudLoad(){
  if(!sb||!SESSION){PROFILE=null;stopPoll();render();return;}
  // is_admin lives on the shared profile (it spans both products); absent row = not admin.
  // Read it FIRST: an admin reaches ym through is_admin and must not auto-register as a
  // pending 主办方, which would put them in their own 待批准 list.
  const {data:pr}=await sb.from('profile').select('is_admin').eq('user_id',SESSION.user.id).maybeSingle();
  const admin=!!(pr&&pr.is_admin);
  // ym membership is its OWN row (0012), orthogonal to the cashflow 区分 — so one account can
  // be a 会計士 in jjcashflow AND a 主办方 here. We never write profile.role from this app.
  const cols='role,status,email';
  let {data:mem}=await sb.from('ym_member').select(cols).eq('user_id',SESSION.user.id).maybeSingle();
  if(!mem&&!admin){ // first visit: register for ym (the server forces status='pending')
    const ins=await sb.from('ym_member').insert({user_id:SESSION.user.id}).select(cols).maybeSingle();
    mem=ins.data||null;
    if(ins.error&&ins.error.code!=='23505')toast('注册失败：'+ins.error.message);
    if(!mem){const re=await sb.from('ym_member').select(cols).eq('user_id',SESSION.user.id).maybeSingle();mem=re.data||null;}
  }
  PROFILE=mem?Object.assign({},mem,{is_admin:admin}):(admin?{status:'none',role:'',is_admin:true}:null);
  // An invite code entered at signup is redeemed on the first real session. It is bound to the
  // address that typed it and expires, so signing in as somebody else on a shared device can
  // never spend their seat on the wrong account.
  const pend=readPendingCode();
  if(pend&&PROFILE&&PROFILE.status!=='approved'
     &&(pend.email||'').toLowerCase()===String(SESSION.user.email||'').toLowerCase()){
    const r=await redeemInvite(pend.code,true);
    if(r==='ok'){const re=await sb.from('ym_member').select(cols).eq('user_id',SESSION.user.id).maybeSingle();
      if(re.data)PROFILE=Object.assign({},re.data,{is_admin:PROFILE.is_admin});}
  }
  if(!canCloud()){startPoll();render();return;}   // pending → watch for the admin's approval
  stopPoll();
  const {data:rows,error}=await sb.from('ym_doc').select('kind,doc_id,payload');
  if(error){toast('云端读取失败：'+error.message);render();return;}
  if(rows&&rows.length){
    // MERGE, never replace. Two devices practising before approval must not delete each
    // other's work: cloud wins per event id, and anything only this device has is kept.
    const cloudEvs=rows.filter(r=>r.kind==='event').map(r=>r.payload).filter(Boolean);
    const have={};cloudEvs.forEach(e=>{if(e&&e.id)have[e.id]=1;});
    const localOnly=(STORE.events||[]).filter(e=>e&&e.id&&!have[e.id]&&!e.demo);
    const lib=rows.find(r=>r.kind==='library');
    STORE={events:cloudEvs.concat(localOnly),
           library:mergeLibrary(lib?lib.payload:null,STORE.library),
           y2:1,y6:1,y7:1};
    ensureY2();
    S.evId=STORE.events[0]?STORE.events[0].id:null;S.sel='header';
    if(localOnly.length)toast('☁ 已同步（本机 '+localOnly.length+' 场活动已合并上传）');
    else toast('☁ 云同步已开启');
    if(localOnly.length)cloudPushAll();
  }else{cloudPushAll();toast('☁ 云同步已开启');}
  render();
}
// union by id; cloud entries win, local-only entries survive
function mergeLibrary(cloud,local){
  if(!cloud)return local;
  if(!local)return cloud;
  const out=JSON.parse(JSON.stringify(cloud));
  ['templates','ideas','resources','money'].forEach(k=>{
    out[k]=out[k]||[];
    const seen={};out[k].forEach(x=>{if(x&&x.id)seen[x.id]=1;});
    (local[k]||[]).forEach(x=>{if(x&&x.id&&!seen[x.id])out[k].push(x);});
  });
  return out;
}
/* An admin's approval writes to the DB and produces NO auth event, so an open pending

let _pollT=null;
function startPoll(){
  if(_pollT||!SESSION)return;

}
function stopPoll(){if(_pollT){clearInterval(_pollT);_pollT=null;}}
const INV_KEY='jjym_invite';
function readPendingCode(){
  try{
    const raw=localStorage.getItem(INV_KEY);if(!raw)return null;
    const o=JSON.parse(raw);
    if(!o||!o.code||!o.exp||Date.now()>o.exp){localStorage.removeItem(INV_KEY);return null;}
    return o;
  }catch(e){try{localStorage.removeItem(INV_KEY);}catch(e2){}return null;}
}
function clearPendingCode(){try{localStorage.removeItem(INV_KEY);}catch(e){}}
async function redeemInvite(code,quiet){
  if(!sb||!SESSION)return 'no-session';
  const {data,error}=await sb.rpc('ym_redeem_invite',{p_code:code});
  if(error){if(!quiet)toast('邀请码校验失败：'+error.message);return 'error';}
  if(data==='ok'||data==='already'||data==='invalid')clearPendingCode();  // never auto-retry
  if(!quiet){
    if(data==='ok')toast('邀请码有效 — 已开通');

    else if(data==='no-profile')toast('请先刷新页面（本机还没登记 ym 账号），再试一次');

  return data;
}
function authInit(){

// Y1 → Y2 localStorage migration: add fields older stores don't have.

  STORE.events.forEach(e=>{

  if(!STORE.y2){

    header:{resources:(tpl?tpl.header.resources:[]).map(cp),money:(tpl?tpl.header.money:[]).map(cp)},
    rows:(tpl?tpl.rows:[]).map(r=>Object.assign({},r,{id:uid(),
      resources:r.resources.map(cp),money:r.money.map(cp)}))};

function ev(){return STORE.events.find(e=>e.id===S.evId)||STORE.events[0]||null;}

/* ================= aggregations (the strips) ================= */
function allResChips(e){let out=e.header.resources.map(c=>({c,where:'活动全场'}));
  e.rows.forEach(r=>r.resources.forEach(c=>out.push({c,where:(r.time?r.time+' ':'')+(r.seg||'')})));return out;}
function allMoneyChips(e){let out=e.header.money.map(c=>({c,where:'活动全场'}));
  e.rows.forEach(r=>r.money.forEach(c=>out.push({c,where:(r.seg||'')})));return out;}
function resCounts(e){const n=[0,0,0,0];allResChips(e).forEach(x=>n[x.c.status||0]++);return n;}
function moneyTotals(e){
  const t={inPlan:0,inActual:0,outPlan:0,outActual:0};
  allMoneyChips(e).forEach(x=>{const c=x.c;
    if(c.kind==='in'){t.inPlan+=c.plan||0;t.inActual+=c.actual||0;}
    else{t.outPlan+=c.plan||0;t.outActual+=c.actual||0;}});
  t.planNet=t.inPlan-t.outPlan;t.actualNet=t.inActual-t.outActual;return t;}
function followUps(e){const f=[];
  allResChips(e).forEach(x=>{if((x.c.status||0)<2)f.push({type:'res',c:x.c,where:x.where,ev:e});});
  allMoneyChips(e).forEach(x=>{if(x.c.actual==null)f.push({type:'money',c:x.c,where:x.where,ev:e});});
  return f;}

let _authBusy=false;
function doSignIn(){
  if(_authBusy||!sb)return;_authBusy=true;
  const email=($('au_email').value||'').trim(),pw=$('au_pw').value||'';
  const code=(($('au_code')||{}).value||'').trim();
  if(!email||!pw){toast('请输入邮箱和密码');_authBusy=false;return;}
  // a code typed on the LOGIN form must count too — the host logs in, they don't register
  try{if(code)localStorage.setItem(INV_KEY,JSON.stringify({code,email,exp:Date.now()+30*60*1000}));}catch(e){}
  toast('登录中…');
  sb.auth.signInWithPassword({email,password:pw}).then(({error})=>{
    _authBusy=false;
    if(error){toast('登录失败：'+error.message);return;}
    S.auth=false;render();toast('已登录，正在检查开通状态…');
  });
}
function doSignUp(){
  if(_authBusy||!sb)return;_authBusy=true;
  const email=($('au_email').value||'').trim(),pw=$('au_pw').value||'';
  const code=(($('au_code')||{}).value||'').trim();
  if(!email||pw.length<6){toast('请输入邮箱和至少6位密码');_authBusy=false;return;}
  // bound to this address and short-lived: the code is redeemed server-side after login
  try{if(code)localStorage.setItem(INV_KEY,JSON.stringify({code,email,exp:Date.now()+30*60*1000}));
      else clearPendingCode();}catch(e){}
  sb.auth.signUp({email,password:pw,options:{emailRedirectTo:'https://ym.jjconnect.tokyo/organizer/'}}).then(({data,error})=>{
    _authBusy=false;
    if(error){toast('注册失败：'+error.message);return;}
    // Supabase returns an obfuscated user with NO identities when the address already exists —
    // without this the host would wait forever for a confirmation mail that never comes.
    const dup=data&&data.user&&Array.isArray(data.user.identities)&&data.user.identities.length===0;
    if(dup){toast('这个邮箱已经注册过了 — 请直接用它「登录」');return;}
    toast(data.session?(code?'注册成功，正在校验邀请码':'注册成功 — 等待管理员批准')
                      :'确认邮件已发送，请查收后回来登录');
    S.auth=false;render();
  });
}
function useCode(){
  const el=$('au_code2');const c=(el&&el.value||'').trim();
  if(!c){toast('请输入邀请码');return;}
  redeemInvite(c,false).then(r=>{if(r==='ok')cloudLoad();});
}
function recheck(){
  if(!SESSION){toast('请先登录');return;}
  toast('正在检查…');
  cloudLoad().then(()=>{if(!canCloud())toast('还没有被批准 — 请稍后再试');});
}
function doSignOut(){clearPendingCode();   // never carry a code across identities
  if(sb)sb.auth.signOut().then(()=>{PROFILE=null;ADMIN=null;POSTS=null;S.auth=false;render();});}

/* ---------- apply ops ---------- */
function applyTpl(id){const t=STORE.library.templates.find(x=>x.id===id),e=ev();if(!t)return;
  if(!e){const ne=instantiate(t);STORE.events.push(ne);S.evId=ne.id;}
  else{
    if(e.rows.length&&!confirm('当前台本已有 '+e.rows.length+' 个环节，用模板覆盖？'))return;
    const ne=instantiate(t);e.rows=ne.rows;e.header=ne.header;
  }
  S.view='sheet';S.drawer=false;save();render();toast('模板已铺入台本');}
function applyIdea(id){const i=STORE.library.ideas.find(x=>x.id===id),e=ev();if(!i||!e)return;
  const chips=(i.res||[]).map(q=>{const r=STORE.library.resources.find(x=>x.role===q||x.name===q);
    return r?{id:uid(),refId:r.id,name:r.name,role:r.role,type:r.type,status:0}:null;}).filter(Boolean);
  e.rows.push({id:uid(),time:'',seg:i.seg,owner:'',resources:chips,money:[]});
  S.sel=e.rows[e.rows.length-1].id;S.drawer=false;save();render();toast('已加入环节：'+i.seg);}
function applyRes(id){const r=STORE.library.resources.find(x=>x.id===id),e=ev();if(!r||!e)return;
  const tgt=S.sel==='header'?e.header:e.rows.find(x=>x.id===S.sel);if(!tgt){toast('先点选一行');return;}
  tgt.resources.push({id:uid(),refId:r.id,name:r.name,role:r.role,type:r.type,status:0});
  S.drawer=false;save();render();toast(r.name+' 已挂上');}
function applyMoney(id){const m=STORE.library.money.find(x=>x.id===id),e=ev();if(!m||!e)return;
  const tgt=S.sel==='header'?e.header:e.rows.find(x=>x.id===S.sel);if(!tgt){toast('先点选一行');return;}
  tgt.money.push({id:uid(),refId:m.id,name:m.name,kind:m.kind,plan:m.amount,unit:m.unit,actual:null});
  S.drawer=false;save();render();toast(m.name+' 已挂上');}

function calHtml(){
  const now=new Date();const y=now.getFullYear(),m=now.getMonth();
  const first=new Date(y,m,1);const start=first.getDay();const dim=new Date(y,m+1,0).getDate();
  const t=todayStr();
  let cells='日一二三四五六'.split('').map(d=>`<div class="dow">${d}</div>`).join('');
  for(let i=0;i<start;i++)cells+='<div class="day out"></div>';
  for(let d=1;d<=dim;d++){
    const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const here=STORE.events.filter(e=>e.date===ds);
    cells+=`<div class="day ${ds===t?'today':''}"><span class="num">${d}</span>
      ${here.map(e=>`<div class="dot">● ${esc(e.name.slice(0,6))}</div>`).join('')}</div>`;}
  return `<div class="cal">${cells}</div>`;
}

// so rundown chips keep resolving by refId and nothing existing has to be rewritten.
const PEO_CATS=[['volunteer','志愿者'],['guest','嘉宾'],['donor','捐赠人']];

// A guest met at an event is filed in the registry, so the same person attending twice is
// ONE record that accumulates history (V1.0: 一个嘉宾可以参加多个活动).
function fileGuest(p){
  if(p.libId&&STORE.library.resources.some(r=>r.id===p.libId))return p.libId;
  const key=(p.name||'').trim();if(!key)return null;
  let rec=peoList('guest').find(r=>(r.name||'').trim()===key&&(!r.gender||!p.gender||r.gender===p.gender));
  if(!rec){
    rec={id:uid(),cat:'guest',type:'人',name:key,gender:p.gender||'',
      occupation:p.job||'',role:''};
    Object.assign(rec,p.profile||{});
    rec.name=key;                                  // profile fields must not clobber identity
    STORE.library.resources.push(rec);
  }else if(p.profile){
    Object.keys(p.profile).forEach(k=>{if(p.profile[k]&&!rec[k])rec[k]=p.profile[k];});
    if(p.job&&!rec.occupation)rec.occupation=p.job;
  }
  p.libId=rec.id;
  return rec.id;
}

function guestHistory(libId){

    if(p.libId!==libId)return;
    out.push({event:e.name,date:e.date,demo:!!e.demo,arrived:!!p.arrived,
      badge:p.gender+p.n,evals:p.evals||[]});}));
  return out;
}

/* ---- 台本 run ---- */
function dayRun(e){
  const rows=e.rows;
  const nextIdx=rows.findIndex(r=>!r.actual);
  let lastDone=-1;rows.forEach((r,i)=>{if(r.actual)lastDone=i;});
  return rows.map((r,i)=>{
    const cls=r.actual?(i===lastDone?'now':'done'):(i===nextIdx?'next':'');
    return `<button class="runrow ${cls}" onclick="tapRun('${r.id}')">
      <span class="rt">${esc(r.time||'--:--')}</span>
      <span class="rs">${esc(r.seg||'（未命名）')}${r.owner?` <span class="ow">· ${esc(r.owner)}</span>`:''}</span>
      ${i===lastDone&&r.actual?'<span class="tag9">进行中</span>':''}
      ${i===nextIdx?'<span class="tag9" style="color:var(--brass-dim)">下一项</span>':''}
      <span class="ra">${r.actual?'实际 '+esc(r.actual):''}</span></button>`;
  }).join('')+`<p class="note9">点一行＝记下实际开始时间（再点撤销）。计划时间不变，复盘看差距。</p>`;
}
function tapRun(id){const r=ev().rows.find(x=>x.id===id);if(!r)return;

/* ---- 记录 rec (voice → confirm; 未确认不入档) ---- */
let REC={mr:null,chunks:[],timer:null,secs:0};
function ymRoster(){const e=ev();
  return {mode:'ym',today:todayStr(),
    participants:e.participants.map(p=>({id:p.id,n:p.gender+p.n,name:p.name})),
    resources:allResChips(e).map(x=>({id:x.c.id,name:x.c.name,role:x.c.role||x.c.type,status:RES_ST[x.c.status||0]})),
    money:allMoneyChips(e).map(x=>({id:x.c.id,name:x.c.name,kind:x.c.kind,plan:x.c.plan})),
    states:RES_ST};
}
function dayRec(e){
  const arrived=e.participants.filter(p=>p.arrived);
  if(!arrived.length&&!S.draft)
    return `<div class="empty">还没有人签到。<br><span class="muted">先去看板点几个号牌，再回来记录。</span></div>`;
  const chips=`<div class="lbl" style="margin-bottom:10px">记录对象</div><div class="whochips">
    ${arrived.map(p=>`<button class="whochip ${S.recWho===p.id?'on':''}"
      onclick="S.recWho='${p.id}';render()">${p.gender}${p.n}${p.evals.length?' ✓'+p.evals.length:''}</button>`).join('')}</div>`;
  if(S.draft)return chips+draftCard(e);
  const phase=S.recPhase||'idle';
  return chips+`
    <button id="recbtn" class="recbtn ${phase==='rec'?'rec':''}" ${!S.recWho?'disabled':''}
      onmousedown="recStart()" onmouseup="recStop()" onmouseleave="recStop()"
      ontouchstart="event.preventDefault();recStart()" ontouchend="recStop()">
      <div id="recline" class="recline"></div>
      <div id="recsec" class="reclbl">${phase==='think'?'整理中…':(S.recWho?'按住说话':'先选号牌')}</div>
    </button>
    <div style="display:flex;justify-content:center;margin-top:12px">
      <button class="btn ghost sm" ${!S.recWho?'disabled':''} onclick="manualEval()">✍️ 手动填写</button></div>
    <p class="note9" style="text-align:center">屏幕不会亮红点，对方看见的只有一条线。<br>说号码最稳：例「女7，沟通积极，建议多主动」。也可以说签到、翻状态、记收支。</p>`;
}
function recStart(){
  if(S.recPhase==='rec')return;   // works from the 记录 tab (with 号牌 selected) or the 🎤 fab anywhere
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    REC.chunks=[];REC.mr=new MediaRecorder(stream);REC.secs=0;
    REC.mr.ondataavailable=ev2=>REC.chunks.push(ev2.data);
    REC.mr.onstop=()=>{stream.getTracks().forEach(t=>t.stop());recSend();};
    REC.mr.start();S.recPhase='rec';
    const b=$('recbtn');if(b)b.classList.add('rec');
    const mf=$('micfab');if(mf)mf.classList.add('rec');
    const s=$('recsec');if(s)s.textContent='0s · 松开结束';
    REC.timer=setInterval(()=>{REC.secs++;
      const el=$('recsec');if(el)el.textContent=REC.secs+'s · 松开结束';
      const ln=$('recline');if(ln)ln.style.width=Math.min(REC.secs*8+12,88)+'%';},1000);
  }).catch(err=>toast('无法使用麦克风：'+err.message));
}
function recStop(){
  if(S.recPhase!=='rec')return;
  clearInterval(REC.timer);S.recPhase='think';
  try{REC.mr.stop();}catch(e2){S.recPhase='idle';}
  render();
  if(!(S.view==='day'&&S.dayTab==='rec'))toast('🎤 整理中…');
}
function recSend(){
  const type=(REC.mr&&REC.mr.mimeType)||'audio/webm';
  const blob=new Blob(REC.chunks,{type});
  const fr=new FileReader();
  fr.onload=()=>{
    fetch(API+'/api/voice',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({audio_b64:String(fr.result).split(',')[1],media_type:type.split(';')[0],roster:ymRoster()})})
    .then(r=>r.json()).then(res=>{S.recPhase='idle';S.draft=res;render();})
    .catch(e2=>{S.recPhase='idle';toast('识别失败：'+e2.message);render();});
  };
  fr.readAsDataURL(blob);
}
function manualEval(){
  S.draft={action:'eval_note',participant_id:S.recWho,manual:true,
    eval:{strengths:'',improvements:'',follow_up:''},
    eval_conf:{strengths:1,improvements:1,follow_up:1},transcript:'',say:''};
  render();
}
/* draft cards — AI proposes, the organizer confirms (convention #4) */
function draftCard(e){
  const d=S.draft;
  const pOf=id=>e.participants.find(p=>p.id===id);
  if(d.action==='eval_note'){
    const p=pOf(d.participant_id);if(!p){S.draft=null;return '';}
    const F=(key,label)=>{const txt=d.eval[key]||'';const conf=(d.eval_conf||{})[key]||0;
      const blank=!txt||conf<0.6;
      return `<div class="sfield ${blank?'blank':''}"><div class="fl">${label}</div>
        <input id="ev_${key}" value="${esc(txt)}" placeholder="">
        ${blank&&!d.manual?`<span class="hint9">${txt?'不太确定—请核对':'没听清—请补'}</span>`:''}</div>`;};
    return `<div class="stockcard">
      <div class="schd"><span class="who">${p.gender}${p.n}</span><span class="sub">${esc(p.name)}${p.job?' · '+esc(p.job):''}</span></div>
      ${F('strengths','优点')}${F('improvements','建议改进')}${F('follow_up','后续跟进')}
      <div class="scbtns">
        <button class="ok" onclick="confirmEval()">确认存档</button>
        <button class="alt" onclick="S.draft=null;render()">${d.manual?'取消':'重录'}</button></div>
      ${d.transcript?`<div class="transcript9">听到：${esc(d.transcript)}</div>`:''}
      <p class="transcript9">未确认不入档。原始转写一并保留。</p></div>`;
  }
  if(d.action==='check_in'){
    const p=pOf(d.participant_id);if(!p){S.draft=null;return '';}
    return simpleDraft(`识别为：<b>${p.gender}${p.n} ${esc(p.name)}</b> ${d.undo?'取消签到':'签到'}`,
      `execCheckin('${p.id}',${d.undo?'true':'false'})`,d.transcript);
  }
  if(d.action==='flip_status'){
    const hit=allResChips(e).find(x=>x.c.id===d.resource_id);if(!hit){S.draft=null;return '';}
    return simpleDraft(`识别为：<b>${esc(hit.c.name)}</b> → <b>${esc(d.status)}</b>`,
      `execFlip('${d.resource_id}','${esc(d.status)}')`,d.transcript);
  }
  if(d.action==='add_cost'){
    const hit=d.money_id?allMoneyChips(e).find(x=>x.c.id===d.money_id):null;
    const label=hit?esc(hit.c.name):esc(d.name);
    return simpleDraft(`识别为：<b>${label}</b> ${d.kind==='in'?'收入':'支出'} 实际 <b>${yen(d.amount)}</b>`,
      `execCost('${d.money_id||''}','${esc(d.name)}','${d.kind}',${Number(d.amount)||0})`,d.transcript);
  }
  return `<div class="stockcard"><div class="draftline">${esc(d.say||'没听懂')}</div>
    ${d.transcript?`<div class="transcript9">听到：${esc(d.transcript)}</div>`:''}
    <div class="scbtns"><button class="alt" onclick="S.draft=null;render()">重录</button></div></div>`;
}
function simpleDraft(html,exec,transcript){
  return `<div class="stockcard"><div class="draftline">${html}</div>
    ${transcript?`<div class="transcript9">听到：${esc(transcript)}</div>`:''}
    <div class="scbtns"><button class="ok" onclick="${exec}">执行</button>
      <button class="alt" onclick="S.draft=null;render()">取消</button></div></div>`;
}
function confirmEval(){
  const e=ev();const d=S.draft;const p=e.participants.find(x=>x.id===d.participant_id);if(!p)return;
  const v=k=>{const el=$('ev_'+k);return el?el.value.trim():'';};
  const rec={id:uid(),strengths:v('strengths'),improvements:v('improvements'),follow_up:v('follow_up'),
    transcript:d.transcript||'',source:d.manual?'manual':'voice',at:new Date().toISOString()};
  if(!rec.strengths&&!rec.improvements&&!rec.follow_up){toast('至少填一项再存档');return;}
  p.evals.push(rec);S.draft=null;save();render();toast(p.gender+p.n+' 的评价已存档');
}
function execCheckin(pid,undo){const p=ev().participants.find(x=>x.id===pid);if(!p)return;
  p.arrived=!undo;p.at=p.arrived?nowHM():null;S.draft=null;save();render();
  toast(p.gender+p.n+(undo?' 已取消签到':' 已签到'));}
function execFlip(cid,status){const e=ev();const hit=allResChips(e).find(x=>x.c.id===cid);if(!hit)return;
  const i=RES_ST.indexOf(status);if(i>=0)hit.c.status=i;S.draft=null;save();render();toast(hit.c.name+' → '+status);}
function execCost(cid,name,kind,amount){const e=ev();
  if(cid){const hit=allMoneyChips(e).find(x=>x.c.id===cid);if(hit)hit.c.actual=amount;}
  else e.header.money.push({id:uid(),refId:null,name:name||'语音记账',kind:kind==='in'?'in':'out',plan:0,actual:amount});
  S.draft=null;save();render();toast('已入账 '+yen(amount));}
/* ---- ⬆ roster CSV import (嘉宾名册 导入 — Excel 另存为 CSV) ---- */
function csvImport(inp){
  const f=inp.files&&inp.files[0];inp.value='';if(!f)return;
  const fr=new FileReader();fr.onload=()=>importRoster(String(fr.result));fr.readAsText(f);

function csvParseLine(l){
  const out=[];let cur='',q=false;
  for(let i=0;i<l.length;i++){const ch=l[i];
    if(q){if(ch==='"'){if(l[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else if(ch==='"')q=true;
    else if(ch===','){out.push(cur);cur='';}
    else cur+=ch;}
  out.push(cur);return out;
}
function importRoster(txt){
  const e=ev();if(!e)return;
  const lines=txt.replace(/^﻿/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){toast('CSV 至少要有表头和一行数据');return;}
  const head=csvParseLine(lines[0]);
  const idx=n=>head.findIndex(h=>h.trim().indexOf(n)>=0);
  const iName=idx('姓名'),iG=idx('性别'),iAge=idx('年龄'),iJob=idx('职业'),
        iTel=idx('联系'),iInc=idx('收入'),iMar=idx('婚姻'),iArea=idx('居住')<0?idx('地区'):idx('居住');
  if(iName<0){toast('没找到「姓名」列 — 第一行需是表头');return;}
  let added=0;
  lines.slice(1).forEach(l=>{
    const c=csvParseLine(l);const name=(c[iName]||'').trim();if(!name)return;
    const g=(iG>=0&&(c[iG]||'').indexOf('男')>=0)?'男':'女';
    const n=Math.max(0,...e.participants.filter(p=>p.gender===g).map(p=>p.n))+1;
    const gv=i=>i>=0?(c[i]||'').trim():'';
    const p={id:uid(),gender:g,n,name,job:gv(iJob),arrived:false,at:null,evals:[],
      profile:{age:gv(iAge),contact:gv(iTel),income:gv(iInc),marital:gv(iMar),area:gv(iArea)}};
    e.participants.push(p);fileGuest(p);      // also files into the 嘉宾名册
    added++;});
  save();render();toast('已导入 '+added+' 人（Excel 名单另存为 CSV 即可）');
}

function peLink(){

  if(!safe){toast('图片只支持 https:// 地址');return;}

function pePaste(e){
  e.preventDefault();
  const cd=e.clipboardData||window.clipboardData;if(!cd)return;
  const html=cd.getData('text/html'),txt=cd.getData('text/plain')||'';
  if(html&&window.ymSanitize){
    const frag=window.ymSanitize.frag(html);
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount){$('po_body').appendChild(frag);return;}
    const r=sel.getRangeAt(0);r.deleteContents();
    const last=frag.lastChild;r.insertNode(frag);
    if(last){r.setStartAfter(last);r.collapse(true);sel.removeAllRanges();sel.addRange(r);}
  }else{
    try{document.execCommand('insertText',false,txt);}catch(e2){}
  }
}
function postSave(publish){
  const p=S.postEdit;if(!canCloud())return;
  const title=($('po_title').value||'').trim();
  if(!title){toast('标题不能为空');return;}
  // never save with the sanitizer missing — that would silently blank a published article
  if(!window.ymSanitize){toast('净化组件未加载，请刷新页面后再保存');return;}
  const body=window.ymSanitize.html($('po_body').innerHTML);
  const row={author:SESSION.user.id,kind:p.kind,title,
    summary:($('po_summary').value||'').trim(),body_html:body,
    post_date:($('po_date').value||null),published:!!publish};
  if(p.id)row.id=p.id;
  sb.from('ym_post').upsert(row).select().then(({data,error})=>{
    if(error){toast('保存失败：'+error.message);return;}
    S.postEdit=null;POSTS=null;render();

    if(error){toast('删除失败：'+error.message);return;}

      .then(({error})=>{if(error)toast('下架失败：'+error.message);POSTS=null;render();});

function syncEventPost(e,announce){
  if(!canCloud()||!e.publicOn||e.demo)return;
  sb.from('ym_post').upsert({author:SESSION.user.id,kind:'event',source_id:e.id,
    title:e.name||'活动',summary:e.theme||'',post_date:e.date||null,published:true,
    meta:{start:e.start||'',venue:e.venue||'',signup:e.signup||''}},
    {onConflict:'author,source_id'}).select('id').then(({data,error})=>{
      if(error){
        // don't just untick locally — that would leave a stale card live on the website
        e.publicOn=false;save();
        sb.from('ym_post').delete().match({author:SESSION.user.id,source_id:e.id})
          .then(()=>{POSTS=null;render();});
        render();toast('公开失败，已从官网撤下：'+error.message);return;}
      if(announce)toast(data&&data.length?'已公开到官网':'已提交');
      POSTS=null;
    });

function adminSet(uid,status){
  if(!status)return;
  // assert on the returned ROW, not merely on the absence of an error: the ym_member trigger
  // silently reverts status for a non-admin caller, which would otherwise "succeed"
  sb.from('ym_member').update({status}).eq('user_id',uid).select('user_id,status').then(({data,error})=>{
    if(error){toast('操作失败：'+error.message);return;}
    const row=data&&data[0];
    if(!row){toast('没有更新任何账号');return;}
    ADMIN=null;render();
    toast(row.status===status?(status==='rejected'?'已停用':'已批准'):'服务器未接受该修改（权限不足）');
  });
}
function adminNewCode(){
  const note=($('ac_note').value||'').trim();
  const uses=parseInt(($('ac_uses').value||'1').replace(/[^\d]/g,''),10)||1;
  const A='ABCDEFGHJKMNPQRSTUVWXYZ23456789';           // no look-alike glyphs
  const buf=new Uint32Array(12);crypto.getRandomValues(buf);
  const body=[...buf].map(x=>A[x%A.length]).join('');
  const code='YM-'+body.slice(0,4)+'-'+body.slice(4,8)+'-'+body.slice(8,12);
  sb.from('ym_invite').insert({code,note,uses_left:uses,
    created_by:SESSION.user.id}).select('code').then(({error})=>{
      if(error){toast('生成失败：'+error.message);return;}
      ADMIN=null;render();adminCopyCode(code);
    });
}
function adminCopyCode(c){
  (navigator.clipboard?navigator.clipboard.writeText(c):Promise.reject())
    .then(()=>toast('已复制邀请码 '+c),()=>prompt('邀请码：',c));
}
function adminRevokeCode(c){
  if(!confirm('作废邀请码 '+c+'？'))return;
  sb.from('ym_invite').update({uses_left:0}).eq('code',c).select('code,uses_left').then(({data,error})=>{
    if(error){toast('作废失败：'+error.message);return;}
    if(!data||!data.length||data[0].uses_left!==0){toast('没有作废（可能已失效或无权限）');ADMIN=null;render();return;}
    ADMIN=null;render();toast('已作废');
  });
}

/* ================= 复盘 review + 保存回资产库 (pass ②) ================= */
function goReview(){S.view='review';S.saveBack=null;render();}
function parseHM(t){if(!t||!/^\d{1,2}:\d{2}$/.test(t))return null;const a=t.split(':');return (+a[0])*60+(+a[1]);}
function fmtGap(plan,act){
  const p=parseHM(plan),a=parseHM(act);
  if(a==null)return {cls:'miss',txt:'未记'};
  if(p==null)return {cls:'ontime',txt:''};
  const d=a-p;if(!d)return {cls:'ontime',txt:'准点'};
  return d>0?{cls:'late',txt:'晚'+d+'分'}:{cls:'early',txt:'早'+(-d)+'分'};
}
function viewReview(){
  const e=ev();if(!e){S.view='sheet';return viewSheet();}
  const mt=moneyTotals(e);
  const am=arrCount(e,'男'),aw=arrCount(e,'女');
  const total=e.participants.length;
  const noshow=e.participants.filter(p=>!p.arrived);
  const evals=e.participants.reduce((s,p)=>s+p.evals.length,0);
  const rows=e.rows.map(r=>{const g=fmtGap(r.time,r.actual);
    return `<div class="rvrow"><span class="c1">${esc(r.time||'--:--')}</span>
      <span class="c2">${esc(r.seg||'')}</span>
      <span class="gap ${g.cls}">${g.txt}</span>
      <span class="c3">${r.actual?esc(r.actual):''}</span></div>`;}).join('');
  const mline=(l,p2,a2)=>`<div class="mline"><span>${l}</span><span class="num">${yen(p2)} → ${yen(a2)}</span></div>`;
  return `<div class="main" style="max-width:640px;margin:0 auto">
    <div class="dayhead"><div><div class="d"><span class="bk" onclick="go('sheet')">← 计划</span> · 复盘</div>
      <div class="t">${esc(e.name)} · ${fmtDate(e.date)}</div></div></div>
    <div class="rvsec"><div class="hd"><span class="lbl">台本 · 计划 → 实际</span></div>${rows||'<div class="empty">无环节</div>'}</div>
    <div class="rvsec"><div class="hd"><span class="lbl">收支 · 预算 → 实际</span></div>
      ${mline('收入',mt.inPlan,mt.inActual)}${mline('支出',mt.outPlan,mt.outActual)}
      <div class="mline total"><span>差额</span><span class="num ${mt.actualNet<0?'neg':'pos'}">${yen(mt.planNet)} → ${yen(mt.actualNet)}</span></div></div>
    <div class="rvsec"><div class="hd"><span class="lbl">到场</span>
      <span class="num" style="font-size:15px">${am+aw}/${total}</span></div>
      <div style="font-size:12.5px">男 ${am} · 女 ${aw} · 评价 ${evals} 条${noshow.length?`<br><span class="muted">未到：${noshow.map(p=>esc(p.gender+p.n+' '+p.name)).join('、')}</span>`:''}</div></div>
    ${volSection(e)}
    <div class="exports">
      <button class="btn sm" onclick="startSaveBack()">💾 保存回资产库</button>
      <button class="btn ghost sm" onclick="shareRundown()">📤 分享台本</button>
      <button class="btn ghost sm" onclick="printRundown()">🖨 打印台本</button>
      <button class="btn ghost sm" onclick="exportMoney()">⬇ 收支 CSV</button>
      <button class="btn ghost sm" onclick="exportPeople()">⬇ 名单·评价 CSV</button></div>
    ${S.saveBack?saveBackCard():''}
    <p class="note9">保存回资产库＝这场活动变成下一场的起点：台本成模板、新环节成灵感、帮过忙的人进资源、实际价格更新收支项。</p>
  </div>`;
}
/* ---- 志愿者 per-event 服务时长/工作评价 (V1.0; feeds the member share) ---- */
function volSection(e){
  const seen={},people=[];
  allResChips(e).forEach(x=>{const c=x.c;
    if((c.type||'人')!=='人'||!c.refId||seen[c.refId])return;
    seen[c.refId]=1;people.push(c);});
  if(!people.length)return '';
  e.volLog=e.volLog||{};
  const rows=people.map(c=>{const log=e.volLog[c.refId]||{};
    return `<div class="rvrow"><span class="c2">👤 ${esc(c.name)}<span class="muted" style="font-size:11px"> ${esc(c.role||'')}</span></span>
      <input style="width:74px;padding:5px 8px" placeholder="时长h" inputmode="decimal" value="${esc(log.hours||'')}"
        onchange="volLog('${c.refId}','hours',this.value)">
      <input style="flex:1.4;padding:5px 8px" placeholder="工作评价" value="${esc(log.review||'')}"
        onchange="volLog('${c.refId}','review',this.value)"></div>`;}).join('');
  return `<div class="rvsec"><div class="hd"><span class="lbl">志愿者 · 服务时长 / 工作评价</span></div>${rows}
    <p class="note9" style="margin:8px 0 0">已授权账号的成员会在自己的页面看到这里的时长与评价。</p></div>`;
}
function volLog(refId,k,v){const e=ev();e.volLog=e.volLog||{};
  e.volLog[refId]=e.volLog[refId]||{};e.volLog[refId][k]=v.trim();save();}

/* ---- save-back builder: what this event can teach the library ---- */
function startSaveBack(){S.saveBack=buildSaveBack(ev());render();}
function buildSaveBack(e){
  const L=STORE.library;
  const dur=i=>{const a=parseHM(e.rows[i].time),b=e.rows[i+1]?parseHM(e.rows[i+1].time):null;
    return a!=null&&b!=null&&b>a?b-a:15;};
  const ideas=[];e.rows.forEach((r,i)=>{
    if(r.seg&&!L.ideas.some(x=>x.seg===r.seg)&&!ideas.some(x=>x.seg===r.seg))
      ideas.push({on:true,seg:r.seg,dur:dur(i),res:r.resources.map(c=>c.role||c.name).slice(0,3)});});
  const rseen={},res=[];
  allResChips(e).forEach(x=>{const c=x.c;
    if(rseen[c.name]||L.resources.some(y=>y.name===c.name))return;
    rseen[c.name]=1;res.push({on:true,name:c.name,type:c.type||'人',role:c.role||'',
      cat:(c.type==='物')?'goods':'volunteer'});});
  const mseen={},money=[];
  allMoneyChips(e).forEach(x=>{const c=x.c;
    if(c.actual==null||mseen[c.name])return;mseen[c.name]=1;
    const it=c.refId?L.money.find(y=>y.id===c.refId):L.money.find(y=>y.name===c.name);
    if(it){if(it.amount!==c.actual)money.push({on:true,mode:'update',refId:it.id,name:c.name,from:it.amount,to:c.actual,kind:c.kind});}
    else money.push({on:true,mode:'new',refId:null,name:c.name,from:null,to:c.actual,kind:c.kind});});
  return {tpl:{on:true,name:(e.name||'活动')+' 模板'},ideas,res,money};
}
function sbToggle(kind,i){const sb=S.saveBack;
  if(kind==='tpl')sb.tpl.on=!sb.tpl.on;else sb[kind][i].on=!sb[kind][i].on;render();}
function sbItem(on,click,what,delta){
  return `<button class="sbitem ${on?'on':''}" onclick="${click}">
    <span class="tick">${on?'✓':'○'}</span><span class="what">${what}</span>
    ${delta?`<span class="delta">${delta}</span>`:''}</button>`;
}
function saveBackCard(){
  const sb=S.saveBack;const e=ev();
  let h=`<div class="rvsec"><div class="hd"><span class="lbl">保存回资产库 — 点选要保留的</span></div>`;
  h+=`<div class="sbsec">模板</div>`+sbItem(sb.tpl.on,"sbToggle('tpl')",
    esc(sb.tpl.name)+`（${e.rows.length}环节·含资源/收支牌，状态清零）`);
  if(sb.ideas.length){h+=`<div class="sbsec">新灵感（库里没有的环节）</div>`+
    sb.ideas.map((x,i)=>sbItem(x.on,`sbToggle('ideas',${i})`,esc(x.seg),'约'+x.dur+'分')).join('');}
  if(sb.res.length){h+=`<div class="sbsec">新资源</div>`+
    sb.res.map((x,i)=>sbItem(x.on,`sbToggle('res',${i})`,(x.type==='人'?'👤 ':'📦 ')+esc(x.name)+(x.role?' · '+esc(x.role):''))).join('');}
  if(sb.money.length){h+=`<div class="sbsec">收支项价格</div>`+
    sb.money.map((x,i)=>sbItem(x.on,`sbToggle('money',${i})`,esc(x.name)+(x.mode==='update'?'（更新价格）':'（新收支项）'),
      (x.from!=null?yen(x.from)+' → ':'')+yen(x.to))).join('');}
  if(!sb.ideas.length&&!sb.res.length&&!sb.money.length)
    h+=`<div class="note9">环节、资源、价格都已在库里 — 只需存模板。</div>`;
  h+=`<div class="scbtns" style="border:0;padding-top:6px">
    <button class="btn" style="flex:1" onclick="applySaveBack()">确认保存</button>
    <button class="btn ghost sm" onclick="S.saveBack=null;render()">取消</button></div></div>`;
  return h;
}
function applySaveBack(){
  const sb=S.saveBack,L=STORE.library,e=ev();let n=0;
  const cpR=c=>Object.assign({},c,{id:uid(),status:0});
  const cpM=c=>Object.assign({},c,{id:uid(),actual:null});
  if(sb.tpl.on){L.templates.push({id:uid(),name:sb.tpl.name,
    note:e.rows.length+'环节 · 来自 '+fmtDate(e.date),
    rows:e.rows.map(r=>({id:uid(),time:r.time,seg:r.seg,owner:r.owner,
      resources:r.resources.map(cpR),money:r.money.map(cpM)})),
    header:{resources:e.header.resources.map(cpR),money:e.header.money.map(cpM)}});n++;}
  sb.ideas.filter(x=>x.on).forEach(x=>{L.ideas.push({id:uid(),seg:x.seg,dur:x.dur,res:x.res});n++;});
  sb.res.filter(x=>x.on).forEach(x=>{L.resources.push({id:uid(),name:x.name,type:x.type,
    cat:x.cat||(x.type==='物'?'goods':'volunteer'),role:x.role});n++;});
  sb.money.filter(x=>x.on).forEach(x=>{
    if(x.refId){const it=L.money.find(y=>y.id===x.refId);if(it)it.amount=x.to;}
    else L.money.push({id:uid(),name:x.name,kind:x.kind,amount:x.to});n++;});
  S.saveBack=null;save();render();toast('已保存回资产库（'+n+' 项）— 下一场从这里开始');
}
/* ---- exports ---- */
function csvEsc(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function dlCSV(name,rows){
  const txt='﻿'+rows.map(r=>r.map(csvEsc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/csv;charset=utf-8'}));
  a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),5000);
}
function exportMoney(){
  const e=ev();const rows=[['类型','名目','计划(円)','实际(円)','挂在']];
  allMoneyChips(e).forEach(x=>rows.push([x.c.kind==='in'?'收入':'支出',x.c.name,
    x.c.plan||0,x.c.actual==null?'':x.c.actual,x.where]));
  const t=moneyTotals(e);
  rows.push(['合计','收入',t.inPlan,t.inActual,'']);
  rows.push(['合计','支出',t.outPlan,t.outActual,'']);
  rows.push(['差额','',t.planNet,t.actualNet,'']);
  dlCSV((e.name||'ym')+'_收支.csv',rows);
}
function exportPeople(){
  const e=ev();const rows=[['编号','姓名','性别','职业','到场','签到时间','评价数','优点','建议改进','后续跟进']];
  e.participants.forEach(p=>{
    const j=k=>p.evals.map(v2=>v2[k]).filter(Boolean).join('；');
    rows.push([p.gender+p.n,p.name,p.gender,p.job||'',p.arrived?'到场':'未到',p.at||'',
      p.evals.length,j('strengths'),j('improvements'),j('follow_up')]);});
  dlCSV((e.name||'ym')+'_名单评价.csv',rows);
}
function shareRundown(){
  const e=ev();
  const txt='【'+e.name+'】'+fmtDate(e.date)+(e.start?' '+e.start:'')+(e.venue?' · '+e.venue:'')+'\n'+
    e.rows.map(r=>(r.time||'--:--')+' '+(r.seg||'')+(r.owner?'（'+r.owner+'）':'')).join('\n');
  share(txt);
}
function printRundown(){
  const e=ev();const w=window.open('','_blank');
  if(!w){toast('浏览器拦截了打印窗口，请允许弹窗');return;}
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+esc(e.name)+' 台本</title>'+
    '<style>body{font:14px/1.8 "Noto Sans JP","PingFang SC",sans-serif;color:#222;padding:28px;max-width:640px;margin:0 auto}'+
    'h1{font-size:18px;margin:0 0 2px}p.m{color:#666;font-size:12px;margin:0 0 16px}'+
    'table{border-collapse:collapse;width:100%}td,th{border-bottom:1px solid #ccc;padding:7px 8px;text-align:left;font-size:13px;vertical-align:top}'+
    'th{font-size:11px;color:#666;font-weight:400}.o{color:#666;font-size:12px}</style></head><body>'+
    '<h1>'+esc(e.name)+'</h1><p class="m">'+fmtDate(e.date)+(e.start?' '+esc(e.start):'')+(e.venue?' · '+esc(e.venue):'')+'</p>'+
    '<table><tr><th>时间</th><th>环节</th><th>负责人</th><th>资源</th></tr>'+
    e.rows.map(r=>'<tr><td>'+esc(r.time||'')+'</td><td>'+esc(r.seg||'')+'</td><td>'+esc(r.owner||'')+
      '</td><td class="o">'+esc(r.resources.map(c=>c.name).join('、'))+'</td></tr>').join('')+
    '</table><scr'+'ipt>print()</scr'+'ipt></body></html>');
  w.document.close();
}

/* ================= boot ================= */
STORE=load();
if(!STORE||!STORE.library){STORE=seed();save();}
ensureY2();
S.evId=STORE.events[0]?STORE.events[0].id:null;
render();
authInit();
</script>
